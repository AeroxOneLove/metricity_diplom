services:
  main-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: main-app
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    volumes:
      - ..:/app/
      - media_data:/app/media

  celery-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: celery-worker
    command: celery -A core.project worker --loglevel=info
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ..:/app/
      - media_data:/app/media

  celery-beat:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: celery-beat
    command: celery -A core.project beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ..:/app/

  media-nginx:
    image: nginx:1.27-alpine
    container_name: media-nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - media_data:/media:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  media_data:
